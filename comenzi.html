    <div class="container">
        <div class="media-container-row">
            <div class="mbr-text col-12 mbr-fonts-style display-7 col-md-12"><p><br></p><p><strong>COMENZI SI LIVRARE</strong></p><p><strong>CUM COMAND?</strong></p><p>Comanda de pe site se poate face prin două modalități:</p><p><strong>*&nbsp;<a href="tel:+3736971220" class="text-primary"><b>Prin Telefon</b></a>&nbsp;-&nbsp;</strong>După ce ai ales produsul pe care il dorești apasă butonul <a href="tel:+37369371220"><strong>comandă acum</strong></a> care te va rederecționa către nr. de telefon al operatorului nostru ce va prelua comanda și datele de livrare.</p><p><strong>*</strong>&nbsp;<a href="page7.html#form4-1t"><strong>Prin e-mail</strong></a>&nbsp;- Poti comanda produsele preferate prin completarea formularul de contact de pe site:<a href="contacte.html#form4-1t">&nbsp;www.toyshop.md/contacte&nbsp;</a></p><p><strong>TERMENI DE LIVRARE</strong></p><p><em>Termenul maxim de livrare în Chișinău este de <strong>la 24 ore pâna la 48 </strong>ore din momentul validării comenzii. &nbsp;Data şi ora livrării va fi coordonată cu tine. Livrarea se efectuează între orele 9.00 – 20.00. Pentru clienții care au nevoie urgent de anumite produse, putem livra în aceeași zi, în funcție de disponibilitatea curierului.<br></em><em>Pentru restul localităților din tară termenul de livrare este de 1- 3 zile.<br>&nbsp;Atenție! Livrăm în toate satele și orașele din țară!</em></p><p><strong>COSTURI DE LIVRARE</strong></p><p><em>Livrarea este GRATUITĂ &nbsp;pentru toate localitățile din țară.<br></em><span style="font-size: 1rem;">Plata se face în lei doar numerar, integral, către curierul firmei în momentul recepţionării produselor.</span></p><p><strong>RIDICAREA COMENZII DE SINE STATATOR.</strong></p><p>În internet-magazinul Toyshop.md, puteți ridica produsul de sine stătator din oficiul nostru situat în or. Chisinau, str. Mesager 11.<br><span style="font-size: 1rem;">Produsele se eliberează de Luni până Sambata între orele 10:00 - 18:00.<br></span><span style="font-size: 1rem;">Produsele se eliberează a doua zi după ce s-a efectuat comanda.<br></span><span style="font-size: 1rem;">Daca comanda s-a plasat sîmbăta, ea va fi disponibilă pentru a fi ridicată - luni.<br></span><span style="font-size: 1rem;">Oparatorul nostru va lua legatura cu dvs pentru a confirma disponibilitatea comenzii.</span><span style="font-size: 1rem;">&nbsp;</span></p><p><strong>RETUR.</strong><br><strong>Pentr returul de produse se vor respecta urmatoarelor reguli:<br></strong><span style="font-size: 1rem;">- Este păstrat bonul de casă;<br></span><span style="font-size: 1rem;">- Nu au trecut nu mai mult de 14 zile calendaristice din data cumpararii produsului;<br></span><span style="font-size: 1rem;">- Jucăria este nefolosită;<br></span><span style="font-size: 1rem;">- Ambalajul/cutia nu este deteriorat;<br></span><span style="font-size: 1rem;">- S-au păstrat toate actele, etichetele, ambalajul si sigiliile originale;<br></span><span style="font-size: 1rem;">- Dacă nu sunt depistate zgârieturi, urme de reparție, încercări de desfacere a jucăriei etc., și nu au fost încălcate regulile de păstrare și garanție (jucăria nu a fost utilizată, scăpată jos, deteriorată etc).</span></p><p>
</p><p>Dacă toate regulile descrise mai sus sunt respectate, e nevoie sa luați legătura cu operatorul nostru (numarul de telefon il găsiți în Contacte), dupa aceea aduceti jucaria, în oficiul nostru, la adresa: or. Chisinau, str. Mesager 11.
</p><p>
</p><p>După ce reprezentantul nostru, va constata ca starea mărfii returnate este în regula (toate mecanismele lucreaza, nu sunt zgîrieturi, sunt toate actele, etichetele si sigiliile originale etc) noi va vom propune o jucărie la schimb sau se vor restitui banii achitați pentru aceasta.
</p><p>
</p><p>Dacă jucăria are defect, după concluzia dată (maximum 7 zile) de service-centru, că defectul nu a apărut în urma exploatării incorecte, noi vom schimba produsul pe unul identic sau vă vom propune unul similar (în cazul in care produsul dorit nu mai e in stoc), sau la dorinta cumpărătorului se vor restitui banii achitați pentru aceasta.
</p><p>
</p><p><strong>IMPORTANT</strong>: Dacă defectul a aparut in urma exploatării incorecte, neglijente, abuzive, diferite de cea descrisa in instrucțiuni, magazinul-online Toyshop are dreptul de a refuza cererea de retur.
</p><p>
</p><p>Nota: Dacă apar întrebări, vă rugam să luați legătura cu operatorul nostru pentru ca noi să rezolvam cît mai curînd posibil problema aparută.
</p><p>
</p><p><strong>Vă mulțumim că ați ales magazinul nostru!</strong></p></div>
